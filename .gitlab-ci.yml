compile-c:
  stage: validate
  needs:
    - job: generate-c
      artifacts: true
  image: mcr.microsoft.com/dotnet/sdk:7.0
  variables:
   XMI_PATH: ${CI_PROJECT_DIR}/cleaned_22.xmi
   CODEGEN_OUTPUT_DIR: ${CI_PROJECT_DIR}/generated/c
  script:
    - rm ./artifacts/*.xml
    - apt-get update && apt-get install --no-install-recommends -y build-essential
    - cd Eulynx.Validation
    - 'dotnet test --test-adapter-path:. --logger:"junit;LogFilePath=..\artifacts\{assembly}-compile-c-test-result.xml;MethodFormat=Class;FailureBodyFormat=Verbose" --filter "TestCategory=compile-c"'
  artifacts:
    when: always
    paths:
      - ./**/*test-result.xml
    reports:
      junit:
        - ./**/*test-result.xml

compile-klee:
  stage: validate
  needs:
    - job: generate-klee
      artifacts: true
  image: klee/klee:3.0
  allow_failure: true
  variables:
   XMI_PATH: ${CI_PROJECT_DIR}/cleaned_22.xmi
   CODEGEN_OUTPUT_DIR: ${CI_PROJECT_DIR}/generated/klee
  script:
    - rm ./artifacts/*.xml
    - sudo chown -R klee:klee $CODEGEN_OUTPUT_DIR
    - sudo apt-get update && sudo apt-get install --no-install-recommends -y dotnet-sdk-7.0
    - cd Eulynx.Validation
    - 'dotnet test --test-adapter-path:. --logger:"junit;LogFilePath=..\artifacts\{assembly}-compile-klee-test-result.xml;MethodFormat=Class;FailureBodyFormat=Verbose" --filter "TestCategory=compile-klee"'
  artifacts:
    when: always
    paths:
      - ./**/*test-result.xml
      - ./generated
    reports:
      junit:
        - ./**/*test-result.xml

execute-klee:
  stage: validate
  needs:
    - job: compile-klee
      artifacts: true
  image: klee/klee:3.0
  variables:
   XMI_PATH: ${CI_PROJECT_DIR}/cleaned_22.xmi
   CODEGEN_OUTPUT_DIR: ${CI_PROJECT_DIR}/generated/klee
  script:
    - rm ./artifacts/*.xml
    - sudo chown -R klee:klee $CODEGEN_OUTPUT_DIR
    - sudo apt-get update && sudo apt-get install --no-install-recommends -y dotnet-sdk-7.0
    - cd Eulynx.Validation
    - 'dotnet test --test-adapter-path:. --logger:"junit;LogFilePath=..\artifacts\{assembly}-execute-klee-test-result.xml;MethodFormat=Class;FailureBodyFormat=Verbose" --filter "TestCategory=execute-klee"'
  artifacts:
    when: always
    paths:
      - ./**/*test-result.xml
    reports:
      junit:
        - ./**/*test-result.xml

test-report:
  stage: report
  image: node:18
  rules:
    - when: always
  script:
   - cp artifacts/*.xml testreport/app/\(default\)/dashboard/
   - cd testreport
   - npm i
   - npm run build
  artifacts:
    paths:
      - ./testreport/out
