stages:
  - validate
  # - generate
  # - compile

parse-classes:
  stage: validate
  image: mcr.microsoft.com/dotnet/sdk:7.0
  variables:
   XMI_PATH: ${CI_PROJECT_DIR}/cleaned_23.xmi
  script:
    - cd Eulynx.Validation
    - 'dotnet test --test-adapter-path:. --logger:"junit;LogFilePath=..\artifacts\{assembly}-test-result.xml;MethodFormat=Class;FailureBodyFormat=Verbose" --filter "TestCategory=parse-classes"'
  artifacts:
    when: always
    paths:
      - ./**/*test-result.xml
    reports:
      junit:
        - ./**/*test-result.xml

