stages:
  - test
  - validate
  # - generate
  # - compile
  - report

build-and-test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:7.0
  variables:
   XMI_PATH: ${CI_PROJECT_DIR}/cleaned_22.xmi
  script:
    - cd XmiToCode.Test
    - dotnet test

parse-classes:
  stage: validate
  image: mcr.microsoft.com/dotnet/sdk:7.0
  variables:
   XMI_PATH: ${CI_PROJECT_DIR}/cleaned_22.xmi
  script:
    - cd Eulynx.Validation
    - 'dotnet test --test-adapter-path:. --logger:"junit;LogFilePath=..\artifacts\{assembly}-parse-classes-test-result.xml;MethodFormat=Class;FailureBodyFormat=Verbose" --filter "TestCategory=parse-classes"'
  artifacts:
    when: always
    paths:
      - ./**/*test-result.xml
    reports:
      junit:
        - ./**/*test-result.xml

generate-c:
  stage: validate
  image: mcr.microsoft.com/dotnet/sdk:7.0
  allow_failure: true
  variables:
   XMI_PATH: ${CI_PROJECT_DIR}/cleaned_22.xmi
   CODEGEN_OUTPUT_DIR: ${CI_PROJECT_DIR}/generated/c
  script:
    - set +e
    - cd Eulynx.Validation
    - 'dotnet test --test-adapter-path:. --logger:"junit;LogFilePath=..\artifacts\{assembly}-generate-c-test-result.xml;MethodFormat=Class;FailureBodyFormat=Verbose" --filter "TestCategory=generate-c" || EXIT_CODE=$?'
    - apt update && apt install -y --no-install-recommends clang-format
    - cd $CODEGEN_OUTPUT_DIR
    - find . -iname '*.h' -o -iname '*.c' | xargs clang-format -style=Microsoft -i
    - exit $EXIT_CODE
  artifacts:
    when: always
    paths:
      - ./**/*test-result.xml
      - ./generated
    reports:
      junit:
        - ./**/*test-result.xml

