name: Publish Pages

on:
  push:
    branches: ["main"]

  # Allows to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_PAGES: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Generate Baseline 4 Release 1
        working-directory: EulynxBaseline4Release1
        env:
          BASE_PATH: /eulynx-codegen/EulynxBaseline4Release1
        run: make 03_TransformationReport/report/index.html

      - name: Generate Baseline 4 Release 2
        working-directory: EulynxBaseline4Release2
        env:
          BASE_PATH: /eulynx-codegen/EulynxBaseline4Release2
        run: make 03_TransformationReport/report/index.html

      - name: Generate Baseline 4 Release 3
        working-directory: EulynxBaseline4Release3
        env:
          BASE_PATH: /eulynx-codegen/EulynxBaseline4Release3
        run: make 03_TransformationReport/report/index.html

      - name: Copy output artifacts
        run: |
          mkdir -p _site/EulynxBaseline4Release2
          cp -r EulynxBaseline4Release2/03_TransformationReport/report/* _site/EulynxBaseline4Release2/
          mkdir -p _site/EulynxBaseline4Release3
          cp -r EulynxBaseline4Release3/03_TransformationReport/report/* _site/EulynxBaseline4Release3/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
